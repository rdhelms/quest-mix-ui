<canvas 
    #gameScreenCanvas 
    class='game-screen__canvas' 
    width='600' 
    height='600'
    tabIndex='1'
    (keyup)='handleKeyUp($event)'
></canvas>
<div class='game-screen__controls'>
    <button (click)='pressedArrow("ArrowLeft")'>Left</button>
    <button (click)='pressedArrow("ArrowRight")'>Right</button>
    <button (click)='pressedArrow("ArrowUp")'>Up</button>
    <button (click)='pressedArrow("ArrowDown")'>Down</button>
</div>
